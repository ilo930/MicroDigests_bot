name: Reply Bot (interactive)

# Listens for your Telegram messages ("more tech", "deeper 3", "help") and answers.
# A short job every 5 minutes long-polls for ~4.5 min then exits; concurrency keeps
# exactly one listener alive at a time. Free (public repo = unlimited Actions).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: telegram-reply
  cancel-in-progress: false   # let the active listener finish before the next starts

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python poller.py
